<article
  tabindex="0"
  class="card rounded-md overflow-hidden cursor-pointer"
  [class.alive]="character().status === 'Alive'"
  [class.dead]="character().status === 'Dead'"
  [class.unknown]="character().status === 'unknown'"
  (click)="onClick()"
>
  <div class="image-container relative">
    <button
      type="button"
      class="favorite-btn absolute z-10 rounded-full flex items-center justify-center cursor-pointer text-white text-16"
      [class.active]="isFavorite()"
      (click)="toggleFavorite($event)"
      [attr.aria-label]="
        isFavorite() ? 'Remove from favorites' : 'Add to favorites'
      "
      [attr.aria-pressed]="isFavorite()"
    >
      <i [class]="isFavorite() ? 'bi bi-heart-fill' : 'bi bi-heart'"></i>
    </button>
    @if (imageState() === "loading") {
      <div class="skeleton absolute inset-0"></div>
    }
    @if (imageState() === "failed") {
      <div
        class="placeholder absolute inset-0 flex items-center justify-center"
      >
        <i class="bi bi-image text-48 opacity-50" aria-hidden="true"></i>
      </div>
    }
    <img
      class="w-full"
      [class.opacity-0]="imageState() !== 'loaded'"
      [imageLoader]="character().image"
      [alt]="character().name"
      decoding="async"
      (stateChange)="onImageStateChange($event)"
    />
  </div>

  <div class="p-16">
    <h3 class="font-display text-20 text-portal mb-8 truncate">
      {{ character().name }}
    </h3>

    <div class="flex items-center gap-8 text-secondary mb-12">
      <span
        class="status-dot"
        [class.alive]="character().status === 'Alive'"
        [class.dead]="character().status === 'Dead'"
        [class.unknown]="character().status === 'unknown'"
        aria-hidden="true"
      ></span>
      <span>{{ character().status }}</span>
    </div>

    <div class="flex flex-col gap-8">
      <div class="flex flex-col gap-2">
        <span class="text-10 text-muted uppercase">Last known location</span>
        <span class="text-primary truncate">{{
          character().location.name
        }}</span>
      </div>

      <div class="flex flex-col gap-2">
        <span class="text-10 text-muted uppercase">Origin</span>
        <span class="text-primary truncate">{{ character().origin.name }}</span>
      </div>
    </div>
  </div>
</article>
